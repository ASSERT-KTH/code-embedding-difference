seed: 42

run:
  save_dir: /mimer/NOBACKUP/groups/naiss2025-5-243/youya/CodeRepair_JEPA_region/checkpoints
  run_name: region_jepa

data:
  source: hf
  hf:
    dataset_id: "ASSERT-KTH/RunBugRun-Final"
    split: "train"
    fields:
      buggy: "buggy_code"
      fixed: "fixed_code"

  indices:
    global_target_dir: "/mimer/NOBACKUP/groups/naiss2025-5-243/Embeddings_RBR/Decoder_RBR/saved_indices"
    split_dir: "/mimer/NOBACKUP/groups/naiss2025-5-243/Embeddings_RBR/Decoder_RBR/subset_indices"
    global_target: "global_target_indices.npy"
    train: "train_idx.npy"
    val: "val_idx.npy"
    test: "test_idx.npy"

  num_workers: 4

encoder:
  name: "answerdotai/ModernBERT-large"
  max_len: 512
  train_mode: "frozen"
  lora:
    enabled: false
    r: 16
    alpha: 32
    dropout: 0.05
    bias: "none"
    target_modules: []

predictor:
  layers: 4
  heads: 8
  mlp_ratio: 4.0
  dropout: 0.1
  use_residual: true
  residual_scale: 1.0

ema:
  tau: 0.996

loss:
  supervision_target: "change_region"   # change_region / change_plus_shared / full_sequence
  shared_weight: 0.1
  w_align: 1.0
  w_var: 1.0
  w_cov: 0.0
  align_eps: 1e-8
  var_target_std: 1.0
  var_eps: 1e-4

train:
  epochs: 3
  batch_size: 8
  grad_accum: 1
  fp16: true
  lr: 2e-5
  lr_encoder: 1e-5
  lr_predictor: 1e-4
  weight_decay: 0.01
  log_every: 50
  eval_every_steps: 500
  save_every_steps: 2000
  save_every_epoch: false
  resume_from: ""
  resume_restore_rng: false

infer:
  ckpt_path: ""
  save_path: "./infer_outputs"
  splits: ["train", "val", "test"]
  split: "test"
  indices_file: ""
  indices_file_by_split: {}
  batch_size: 8
  save_dtype: "float16"
  max_items: -1

optim:
  betas: [0.9, 0.999]
  eps: 1e-8

ddp:
  enabled: true
  backend: "nccl"
  find_unused_parameters: false

wandb:
  enabled: false
  entity: ""
  project: "CodeRepair_JEPA_region"
  group: "encoder"
  run_name: ""
  id: ""
  resume: "never"
